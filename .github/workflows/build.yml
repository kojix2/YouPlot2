name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: x86_64-pc-windows-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Crystal
        if: matrix.target != 'x86_64-pc-windows-gnu'
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install Crystal (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-crystal
            mingw-w64-x86_64-shards
            mingw-w64-x86_64-binutils
            zip

      - name: Set version variables
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${{ github.ref_name }}
            echo "CRYSTAL_RELEASE_FLAGS=--no-debug" >> $GITHUB_ENV
            echo "STRIP_RELEASE=true" >> $GITHUB_ENV
          else
            VERSION="build-$(date +%Y%m%d-%H%M%S)"
            echo "CRYSTAL_RELEASE_FLAGS=" >> $GITHUB_ENV
            echo "STRIP_RELEASE=false" >> $GITHUB_ENV
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BIN=uplot2" >> $GITHUB_ENV
          echo "PKG_NAME=youplot2" >> $GITHUB_ENV

      - name: Install dependencies
        if: matrix.target != 'x86_64-pc-windows-gnu'
        run: shards install --without-development

      - name: Install dependencies (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: shards install --without-development

      - name: Run tests
        if: matrix.target != 'x86_64-pc-windows-gnu'
        run: |
          shards build
          ./bin/uplot2 --help
          crystal spec

      - name: Run tests (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: |
          shards build
          ./bin/uplot2 --help
          crystal spec

      - name: Build on Linux
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          mkdir -p bin
          docker run -d --name alpine -v $(pwd):/workspace -w /workspace crystallang/crystal:latest-alpine tail -f /dev/null
          docker exec alpine apk add binutils pcre2-dev pcre2-static
          docker exec alpine shards install --without-development --release --static
          docker exec alpine shards build --release --static $CRYSTAL_RELEASE_FLAGS
          docker exec alpine chmod +x bin/$BIN
          if [[ "$STRIP_RELEASE" == true ]]; then
            docker exec alpine strip bin/$BIN
          fi
          ldd bin/$BIN || echo "Static binary (no dynamic dependencies)"
          file bin/$BIN
          bin/$BIN --help
          PKG=${PKG_NAME}-${VERSION}-${{ matrix.target }}
          mkdir -p $PKG
          cp bin/$BIN $PKG/
          cp LICENSE $PKG/
          cp README.md $PKG/
          tar czf $PKG.tar.gz $PKG

      - name: Build on macOS
        if: startsWith(matrix.target, 'x86_64-apple-darwin') || startsWith(matrix.target, 'aarch64-apple-darwin')
        shell: bash
        run: |
          shards install --without-development --release
          brew update
          brew install libgc pcre2
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          unset PKG_CONFIG_PATH
          echo "cleared PKG_CONFIG_PATH to avoid openSSL conflicts"
          ln -s $(brew ls libgc | grep libgc.a) .
          ln -s $(brew ls pcre2 | grep libpcre2-8.a) .
          STATIC_LIBS="-L $(pwd) $(pwd)/libgc.a $(pwd)/libpcre2-8.a"
          shards build --link-flags="$STATIC_LIBS" --release $CRYSTAL_RELEASE_FLAGS
          chmod +x bin/$BIN
          if [[ "$STRIP_RELEASE" == true ]]; then
            strip bin/$BIN
          fi
          otool -L bin/$BIN
          if otool -L bin/$BIN | grep homebrew; then
            echo "Error: Homebrew dependencies detected!"
            exit 1
          fi
          echo "Static linking successful"
          file bin/$BIN
          bin/$BIN --help
          PKG=${PKG_NAME}-${VERSION}-${{ matrix.target }}
          mkdir -p $PKG
          cp bin/$BIN $PKG/
          cp LICENSE $PKG/
          cp README.md $PKG/
          tar czf $PKG.tar.gz $PKG

      - name: Build on Windows (MSVC)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          shards install --without-development --release
          $buildArgs = @("--release", "--static", "--link-flags=-lucrt")
          if ($env:CRYSTAL_RELEASE_FLAGS) {
            $buildArgs += $env:CRYSTAL_RELEASE_FLAGS
          }
          shards build @buildArgs
          if ($env:STRIP_RELEASE -eq "true") {
            if (Get-Command llvm-strip -ErrorAction SilentlyContinue) {
              llvm-strip "bin/$env:BIN.exe"
            } elseif (Get-Command strip -ErrorAction SilentlyContinue) {
              strip "bin/$env:BIN.exe"
            } else {
              throw "No strip command found for release build"
            }
          }
          & "bin/$env:BIN.exe" --help
          $pkg = "$env:PKG_NAME-$env:VERSION-${{ matrix.target }}"
          mkdir $pkg
          Copy-Item "bin/$env:BIN.exe" "$pkg/"
          Copy-Item "LICENSE" "$pkg/"
          Copy-Item "README.md" "$pkg/"
          Compress-Archive -Path "$pkg/*" -DestinationPath "$pkg.zip"

      - name: Build on Windows (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: |
          shards install --without-development --release
          shards build --release --static $CRYSTAL_RELEASE_FLAGS
          if [[ "$STRIP_RELEASE" == true ]]; then
            strip bin/$BIN.exe
          fi
          file bin/$BIN.exe
          bin/$BIN.exe --help
          PKG=${PKG_NAME}-${VERSION}-${{ matrix.target }}
          mkdir -p $PKG
          cp bin/$BIN.exe $PKG/
          cp LICENSE $PKG/
          cp README.md $PKG/
          zip -r $PKG.zip $PKG

      - name: Upload artifacts (non-release)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: youplot2-${{ matrix.target }}
          path: |
            youplot2-*.tar.gz
            youplot2-*.zip

      - name: Upload release assets (release only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            youplot2-*.tar.gz
            youplot2-*.zip
